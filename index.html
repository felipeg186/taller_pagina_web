<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Automotriz Colombia 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <div class="portada">
      
      <h1 class="portada-titulo">
        Los más<br>
        <span>vendidos</span>
        2025
      </h1>
      <p class="portada-descripcion">
        El ranking oficial de los vehículos y motos más matriculados en Colombia durante 2025,
        con base en cifras de <strong>ANDEMOS</strong>, <strong>ANDI</strong> y <strong>Fenalco</strong>.
      </p>
      <div class="portada-datos">
        <div class="dato">
          <div class="dato-num">254K</div>
          <div class="dato-lbl">Vehículos matriculados</div>
        </div>
        <div class="dato">
          <div class="dato-num">+26%</div>
          <div class="dato-lbl">Crecimiento vs 2024</div>
        </div>
        <div class="dato">
          <div class="dato-num">1.1M</div>
          <div class="dato-lbl">Motos matriculadas</div>
        </div>
      </div>
    </div>

    <nav class="section-nav">
    <button class="tab-btn active" onclick="showSection('autos', this)">🚗 Automóviles</button>
    <button class="tab-btn"       onclick="showSection('motos', this)">🏍️ Motos</button>
    </nav>
    
</body>
</html>
